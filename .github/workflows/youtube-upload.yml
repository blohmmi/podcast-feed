name: Upload to YouTube
on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Google Drive File ID'
        required: true
      title:
        description: 'Název epizody'
        required: true
      episode_num:
        description: 'Číslo epizody'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gdown google-api-python-client google-auth-oauthlib

      - name: Download audio from Drive
        run: gdown "${{ github.event.inputs.file_id }}" -O audio.mp3

      - name: Install FFmpeg
        run: |
          # Pokus 1: apt-get
          sudo apt-get update -qq && sudo apt-get install -y ffmpeg && ffmpeg -version && exit 0 || true

          # Pokus 2: BtbN GitHub releases
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" -o ffmpeg.tar.xz && \
          tar xf ffmpeg.tar.xz && \
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg && \
          ffmpeg -version && exit 0 || true

          # Pokus 3: evermeet.cx statická binárka
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip && \
          unzip ffmpeg.zip && \
          sudo mv ffmpeg /usr/local/bin/ffmpeg && \
          ffmpeg -version && exit 0 || true

          # Pokud vše selhalo
          echo "FFmpeg se nepodařilo nainstalovat" && exit 1

      - name: Create video from audio + cover
        run: |
          ffmpeg -loop 1 -i cover.jpg -i audio.mp3 \
            -c:v libx264 -tune stillimage \
            -c:a aac -b:a 192k \
            -pix_fmt yuv420p -shortest output.mp4

      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          VIDEO_TITLE: ${{ github.event.inputs.title }}
        run: python upload_youtube.py --file output.mp4
